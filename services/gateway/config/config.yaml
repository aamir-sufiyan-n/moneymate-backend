server:
  http_addr: ":8080"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

# downstream services gateway talks to
# no DB config — gateway owns no data
services:
  auth_grpc_addr: "auth:9091"      # gRPC — for token validation
  auth_http_addr: "http://auth:8081" # HTTP — for proxying login/register

redis:
  # gateway uses redis ONLY for rate limiting
  # no token TTLs, no OTP TTLs, no PIN lockout
  # those belong to auth-svc
  rate_limit_window: 1m

rate_limit:
  global_requests_per_minute: 100
  auth_requests_per_minute: 20      # stricter on auth routes
  public_requests_per_minute: 60

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "https://moneymate.app"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Idempotency-Key"

jwt:
  # gateway only VALIDATES tokens, never issues them
  # so only needs the secret, no expiry config
  # expiry is already baked into the token by auth-svc
  access_expiry_minutes: 15         # needed to set cookie maxage if using cookies

log:
  level: info