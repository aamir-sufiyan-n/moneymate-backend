server:
  port: "8080"
  environment: "development"

services:
  auth_addr: "localhost:9091"
  downstream:
    payment: "localhost:9092"
    merchant: "localhost:9093"
    campaign: "localhost:9094"
    debt: "localhost:9095"
    pod: "localhost:9096"
    scheduler: "localhost:9097"
    referral: "localhost:9098"
    rewards: "localhost:9099"
    routing: "localhost:9100"
    notification: "localhost:9101"

redis:
  address: "localhost:6379"
  password: ""
  db: 0

rate_limiting:
  enabled: true
  max_requests: 100
  window_seconds: 60

cors:
  allow_origins: "http://localhost:3000,http://localhost:8080"
  allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
  allow_headers: "Authorization,Content-Type,Idempotency-Key,X-Transaction-Token,X-Transaction-ID"

tracing:
  enabled: false
  collector_url: "localhost:4317"
